---
layout: default
---

<article class="lab-post">
  <div class="lab-post-header">
    <div class="lab-meta-top">
      <a href="{{ '/labs/' | relative_url }}" class="back-link">← All Labs</a>
      <span class="lab-date">{{ page.date | date: "%B %d, %Y" }}</span>
    </div>

    <h1 class="lab-post-title">{{ page.title }}</h1>
    <p class="lab-post-summary">{{ page.summary }}</p>

    <div class="lab-post-meta">
      <span class="difficulty diff-{{ page.difficulty }}">{{ page.difficulty }}</span>
      <span class="duration">⏱ {{ page.duration }}</span>
      <div class="tag-list">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
    </div>

    {% if page.github_link %}
    <a href="{{ page.github_link }}" target="_blank" class="btn btn-primary" style="margin-top:24px;display:inline-flex">⎋ View on GitHub</a>
    {% endif %}
  </div>

  <div class="lab-post-body">
    {{ content }}
  </div>
</article>
